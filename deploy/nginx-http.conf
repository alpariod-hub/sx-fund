# SX Fund — Nginx HTTP-only config (Phase 1, before SSL)
# sudo cp deploy/nginx-http.conf /etc/nginx/sites-available/sxfund
# sudo ln -sf /etc/nginx/sites-available/sxfund /etc/nginx/sites-enabled/sxfund
# sudo rm -f /etc/nginx/sites-enabled/default
# sudo nginx -t && sudo systemctl reload nginx
# ══════════════════════════════════════════════════════════════════════════════

limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;

server {
    listen 80 default_server;
    server_name _;

    # Health check
    location /health {
        return 200 'ok\n';
        add_header Content-Type text/plain;
    }

    # API — proxy to local PM2 process
    location /api/ {
        limit_req zone=api burst=40 nodelay;
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto http;
        proxy_read_timeout 60s;
    }
}
