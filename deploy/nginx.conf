# ══════════════════════════════════════════════════════════════════════════════
# SX Fund — Nginx configuration
# Server: Vultr Frankfurt (45.32.158.100)  |  Domain: trinityfund.io
# Proxy: Cloudflare Full (Strict)  |  SSL: Let's Encrypt via Certbot
#
# Subdomains (all with Cloudflare proxy ON ☁️):
#   api.trinityfund.io      → Express API + Telegram webhook  (port 8080)
#   sed-hub.trinityfund.io  → SED-Hub React frontend (static)
#   trinityfund.io          → SX Fund investor landing page (static)
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/trinityfund
#   sudo ln -sf /etc/nginx/sites-available/trinityfund /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# ⚠️  webmin and portainer must NOT be proxied by Cloudflare — see security note below
# ══════════════════════════════════════════════════════════════════════════════

# ── Rate limiting ─────────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=webhook:10m rate=300r/m;

# ── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    server_name trinityfund.io *.trinityfund.io;
    return 301 https://$host$request_uri;
}

# ── api.trinityfund.io — Express API + Telegram webhook ──────────────────────
server {
    listen 443 ssl;
    server_name api.trinityfund.io;

    ssl_certificate     /etc/letsencrypt/live/trinityfund.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trinityfund.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Telegram webhook — higher rate limit (Telegram sends many updates)
    location /api/bot/webhook {
        limit_req zone=webhook burst=50 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other API endpoints
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

# ── sed-hub.trinityfund.io — SED-Hub React frontend ─────────────────────────
server {
    listen 443 ssl;
    server_name sed-hub.trinityfund.io;

    ssl_certificate     /etc/letsencrypt/live/trinityfund.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trinityfund.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/sx-fund/sed-hub/dist;
    index index.html;

    # SPA fallback — all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Static assets — cache aggressively (Vite adds content hash to filenames)
    location ~* \.(js|css|woff2?|png|svg|ico|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── trinityfund.io — SX Fund investor landing page ──────────────────────────
server {
    listen 443 ssl;
    server_name trinityfund.io www.trinityfund.io;

    ssl_certificate     /etc/letsencrypt/live/trinityfund.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trinityfund.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/sx-fund/sx-fund/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location ~* \.(js|css|woff2?|png|svg|ico|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
