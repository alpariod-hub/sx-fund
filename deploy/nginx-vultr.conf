# ══════════════════════════════════════════════════════════════════════════════
# SX Fund — Nginx (Vultr Frankfurt, Phase 1)
# API runs locally. Frontends proxy to Replit until built locally.
#
# sudo cp deploy/nginx-vultr.conf /etc/nginx/sites-available/trinityfund
# sudo ln -sf /etc/nginx/sites-available/trinityfund /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
# ══════════════════════════════════════════════════════════════════════════════

limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=webhook:10m rate=300r/m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name trinityfund.io *.trinityfund.io;
    return 301 https://$host$request_uri;
}

# ── api.trinityfund.io — Express API + Telegram webhook (LOCAL port 8080) ─────
server {
    listen 443 ssl;
    server_name api.trinityfund.io;

    ssl_certificate     /etc/letsencrypt/live/api.trinityfund.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.trinityfund.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # Telegram webhook
    location /api/bot/webhook {
        limit_req zone=webhook burst=50 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # All API endpoints
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}

# ── sed-hub.trinityfund.io — SED-Hub (Phase 1: proxy to Replit) ───────────────
server {
    listen 443 ssl;
    server_name sed-hub.trinityfund.io;

    ssl_certificate     /etc/letsencrypt/live/sed-hub.trinityfund.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sed-hub.trinityfund.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Phase 1: proxy to Replit deployment
    location / {
        proxy_pass https://sx-fund.replit.app/sed-hub/;
        proxy_http_version 1.1;
        proxy_set_header Host sx-fund.replit.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # Phase 2 (later): serve locally
    # root /var/www/sx-fund/sed-hub/dist;
    # index index.html;
    # location / { try_files $uri $uri/ /index.html; }
}

# ── trinityfund.io — Investor landing (Phase 1: proxy to Replit) ──────────────
server {
    listen 443 ssl;
    server_name trinityfund.io www.trinityfund.io;

    ssl_certificate     /etc/letsencrypt/live/trinityfund.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trinityfund.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass https://sx-fund.replit.app/;
        proxy_http_version 1.1;
        proxy_set_header Host sx-fund.replit.app;
        proxy_ssl_server_name on;
    }
}
